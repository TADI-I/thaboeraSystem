<!-- suppliers.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Suppliers Management</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="management-container">
    <h1>Suppliers & Resellers</h1>
    
    <div class="table-actions">
      <button id="addSupplierBtn" class="btn-primary">Add New Supplier</button>
      <input type="text" id="supplierSearch" placeholder="Search suppliers...">
    </div>
    
    <table id="suppliersTable">
      <thead>
        <tr>
          <th>Supplier Name</th>
          <th>Contact Person</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Products Supplied</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Suppliers will be populated by JS -->
      </tbody>
    </table>
  </div>
  
  <!-- Supplier Modal -->
  <div id="supplierModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="supplierModalTitle">Add New Supplier</h2>
      <form id="supplierForm">
        <input type="hidden" id="supplierId">
        <div class="form-group">
          <input type="text" id="supplierName" placeholder="Supplier Name" required>
        </div>
        <div class="form-group">
          <input type="text" id="contactPerson" placeholder="Contact Person" required>
        </div>
        <div class="form-group">
          <input type="email" id="supplierEmail" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="tel" id="supplierPhone" placeholder="Phone Number">
        </div>
        <div class="form-group">
          <textarea id="supplierAddress" placeholder="Address"></textarea>
        </div>
        <div class="form-group">
          <label>Products Supplied</label>
          <select id="suppliedProducts" multiple>
            <!-- Products will be populated by JS -->
          </select>
        </div>
        <button type="submit" class="btn-primary">Save Supplier</button>
      </form>
    </div>
  </div>
  
  <script src="suppliers.js"></script>
</body>
</html>
