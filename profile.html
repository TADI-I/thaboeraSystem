<!-- profile.html -->
<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <div class="avatar-container">
        <img id="profileImage" src="default-avatar.jpg" alt="Profile Picture">
        <button id="changeImageBtn">Change Image</button>
        <input type="file" id="imageUpload" accept="image/*" style="display:none;">
      </div>
      <h1 id="profileName">John Doe</h1>
      <p id="profileEmail">john@example.com</p>
    </div>
    
    <div class="profile-details">
      <h2>Account Information</h2>
      <form id="profileForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" value="John Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" value="john@example.com">
        </div>
        <button type="submit" class="btn-primary">Update Profile</button>
      </form>
      
      <h2>Change Password</h2>
      <form id="passwordForm">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="currentPassword">
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPassword">
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="confirmPassword">
        </div>
        <button type="submit" class="btn-primary">Change Password</button>
      </form>
    </div>
  </div>
  
  <script src="profile.js"></script>
</body>
</html>
