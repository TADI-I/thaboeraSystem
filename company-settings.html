<!-- company-settings.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Company Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="settings-container">
    <h1>Company Settings</h1>
    
    <div class="settings-tabs">
      <button class="tab-btn active" data-tab="general">General</button>
      <button class="tab-btn" data-tab="branding">Branding</button>
      <button class="tab-btn" data-tab="invoice">Invoice Settings</button>
      <button class="tab-btn" data-tab="tax">Tax Settings</button>
    </div>
    
    <div class="settings-content">
      <div id="general-tab" class="tab-content active">
        <form id="companyForm">
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="companyName" value="My IT Solutions Inc." required>
          </div>
          <div class="form-group">
            <label>Address</label>
            <textarea id="companyAddress">123 Business St, City, Country</textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" id="companyPhone" value="+1 (555) 123-4567">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="companyEmail" value="contact@myitsolutions.com">
            </div>
          </div>
          <div class="form-group">
            <label>Website</label>
            <input type="url" id="companyWebsite" value="https://www.myitsolutions.com">
          </div>
          <div class="form-group">
            <label>Business Number</label>
            <input type="text" id="businessNumber" value="123456789">
          </div>
          <button type="submit" class="btn-primary">Save General Settings</button>
        </form>
      </div>
      
      <div id="branding-tab" class="tab-content">
        <form id="brandingForm">
          <div class="form-group">
            <label>Company Logo</label>
            <div class="logo-preview">
              <img id="logoPreview" src="company-logo.png" alt="Company Logo">
              <input type="file" id="logoUpload" accept="image/*">
              <button type="button" id="uploadLogoBtn" class="btn-secondary">Upload New Logo</button>
            </div>
          </div>
          <div class="form-group">
            <label>Primary Color</label>
            <input type="color" id="primaryColor" value="#3a7bd5">
          </div>
          <div class="form-group">
            <label>Secondary Color</label>
            <input type="color" id="secondaryColor" value="#00d2ff">
          </div>
          <div class="form-group">
            <label>Favicon</label>
            <input type="file" id="faviconUpload" accept="image/x-icon,.ico">
          </div>
          <button type="submit" class="btn-primary">Save Branding</button>
        </form>
      </div>
      
      <!-- Other tabs would contain similar forms -->
    </div>
  </div>
  
  <script src="company-settings.js"></script>
</body>
</html>
