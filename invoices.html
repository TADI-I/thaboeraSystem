<!DOCTYPE html>
<html>
<head>
  <title>Sales Reports</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #3a7bd5;
      --primary-light: #5fa2ff;
      --primary-dark: #1a56b0;
      --secondary: #f5f7fa;
      --accent: #00d2ff;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --border: #e0e6ed;
      --success: #4caf50;
      --warning: #ff9800;
      --danger: #f44336;
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background-color: #f8fafc;
      color: var(--text);
    }

    .reports-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px;
    }

    h1 {
      margin-bottom: 25px;
      color: var(--text);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 i {
      color: var(--primary);
    }

    h2 {
      margin: 25px 0 15px;
      font-weight: 500;
      color: var(--text);
    }

    /* Report Filters */
    .report-filters {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: var(--card-shadow);
      margin-bottom: 30px;
    }

    .filter-row {
      display: flex;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 20px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }

    .filter-group label {
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-light);
      font-weight: 500;
    }

    .custom-dates {
      gap: 10px;
      align-items: flex-end;
    }

    .custom-dates span {
      color: var(--text-light);
      font-size: 14px;
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      border: none;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: white;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .btn-secondary:hover {
      background-color: var(--secondary);
      transform: translateY(-1px);
    }

    /* Form Elements */
    select, input[type="date"] {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.2s;
      background-color: white;
    }

    select:focus, input[type="date"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(58, 123, 213, 0.1);
    }

    /* Charts Section */
    .report-charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }

    .chart-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: var(--card-shadow);
    }

    .chart-container canvas {
      width: 100% !important;
      height: 350px !important;
    }

    /* Report Data Table */
    .report-data {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: var(--card-shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th {
      background-color: var(--secondary);
      color: var(--text-light);
      padding: 12px 15px;
      text-align: left;
      font-weight: 500;
      font-size: 14px;
    }

    td {
      padding: 12px 15px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background-color: rgba(58, 123, 213, 0.03);
    }

    /* Responsive Design */
    @media (max-width: 1200px) {
      .reports-container {
        padding: 20px;
      }
    }

    @media (max-width: 768px) {
      .report-charts {
        grid-template-columns: 1fr;
      }
      
      .filter-row {
        flex-direction: column;
        align-items: stretch;
        gap: 15px;
      }
      
      .filter-group {
        min-width: 100%;
      }
      
      .custom-dates {
        flex-direction: column;
        align-items: stretch;
      }
      
      .btn {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 576px) {
      .reports-container {
        padding: 15px;
      }
      
      .chart-container {
        padding: 15px;
      }
      
      .report-data {
        padding: 15px;
      }
      
      th, td {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="reports-container">
    <h1><i class="fas fa-chart-line"></i> Sales Reports</h1>
    
    <div class="report-filters">
      <div class="filter-row">
        <div class="filter-group">
          <label>Date Range</label>
          <select id="dateRange">
            <option value="today">Today</option>
            <option value="week">This Week</option>
            <option value="month" selected>This Month</option>
            <option value="quarter">This Quarter</option>
            <option value="year">This Year</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="filter-group custom-dates" style="display:none;">
          <label>Custom Date Range</label>
          <div style="display: flex; align-items: center; gap: 10px;">
            <input type="date" id="startDate">
            <span>to</span>
            <input type="date" id="endDate">
          </div>
        </div>
        <div class="filter-group">
          <label>Group By</label>
          <select id="groupBy">
            <option value="day">Day</option>
            <option value="week">Week</option>
            <option value="month" selected>Month</option>
            <option value="quarter">Quarter</option>
            <option value="year">Year</option>
          </select>
        </div>
        <button id="applyFilters" class="btn btn-primary">
          <i class="fas fa-filter"></i> Apply Filters
        </button>
        <button id="exportReport" class="btn btn-secondary">
          <i class="fas fa-file-export"></i> Export
        </button>
      </div>
    </div>
    
    <div class="report-charts">
      <div class="chart-container">
        <canvas id="salesTrendChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="productPerformanceChart"></canvas>
      </div>
    </div>
    
    <div class="report-data">
      <h2><i class="fas fa-table"></i> Detailed Sales Data</h2>
      <table id="salesDataTable">
        <thead>
          <tr>
            <th>Period</th>
            <th>Invoices</th>
            <th>Revenue</th>
            <th>Tax</th>
            <th>Profit</th>
            <th>Avg. Invoice</th>
          </tr>
        </thead>
        <tbody>
          <!-- Data will be populated by JS -->
        </tbody>
      </table>
    </div>
  </div>
  
  <script src="sales-reports.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
