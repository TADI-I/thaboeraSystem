<!-- email-settings.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Email & SMS Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="settings-container">
    <h1>Email & SMS Configuration</h1>
    
    <div class="settings-tabs">
      <button class="tab-btn active" data-tab="email">Email</button>
      <button class="tab-btn" data-tab="sms">SMS</button>
      <button class="tab-btn" data-tab="templates">Templates</button>
    </div>
    
    <div class="settings-content">
      <div id="email-tab" class="tab-content active">
        <form id="emailForm">
          <div class="form-group">
            <label>SMTP Host</label>
            <input type="text" id="smtpHost" value="smtp.example.com" required>
          </div>
          <div class="form-group">
            <label>SMTP Port</label>
            <input type="number" id="smtpPort" value="587" required>
          </div>
          <div class="form-group">
            <label>SMTP Username</label>
            <input type="text" id="smtpUser" value="noreply@example.com" required>
          </div>
          <div class="form-group">
            <label>SMTP Password</label>
            <input type="password" id="smtpPass" required>
          </div>
          <div class="form-group">
            <label>Encryption</label>
            <select id="smtpEncryption">
              <option value="tls">TLS</option>
              <option value="ssl">SSL</option>
              <option value="none">None</option>
            </select>
          </div>
          <div class="form-group">
            <label>From Email</label>
            <input type="email" id="fromEmail" value="noreply@example.com" required>
          </div>
          <div class="form-group">
            <label>From Name</label>
            <input type="text" id="fromName" value="My IT Solutions" required>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Save Email Settings</button>
