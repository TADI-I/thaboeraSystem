<!-- stock-reports.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Stock Reports</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="reports-container">
    <h1>Stock Reports</h1>
    
    <div class="report-filters">
      <div class="filter-row">
        <div class="filter-group">
          <label>Category</label>
          <select id="categoryFilter">
            <option value="">All Categories</option>
            <!-- Categories will be populated by JS -->
          </select>
        </div>
        <div class="filter-group">
          <label>Stock Status</label>
          <select id="stockStatus">
            <option value="">All Items</option>
            <option value="low">Low Stock</option>
            <option value="out">Out of Stock</option>
            <option value="over">Overstocked</option>
          </select>
        </div>
        <button id="applyFilters" class="btn-primary">Apply</button>
        <button id="exportReport" class="btn-secondary">Export</button>
      </div>
    </div>
    
    <div class="report-charts">
      <div class="chart-container">
        <canvas id="stockLevelsChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="stockMovementChart"></canvas>
      </div>
    </div>
    
    <div class="report-data">
      <h2>Inventory Summary</h2>
      <div class="summary-cards">
        <div class="card">
          <h3>Total Products</h3>
          <p id="totalProducts">0</p>
        </div>
        <div class="card">
          <h3>Low Stock Items</h3>
          <p id="lowStockItems">0</p>
        </div>
        <div class="card">
          <h3>Out of Stock</h3>
          <p id="outOfStockItems">0</p>
        </div>
        <div class="card">
          <h3>Total Inventory Value</h3>
          <p id="totalValue">$0.00</p>
        </div>
      </div>
      
      <h2>Stock Items</h2>
      <table id="stockDataTable">
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Current Stock</th>
            <th>Reorder Level</th>
            <th>Status</th>
            <th>Value</th>
          </tr>
        </thead>
        <tbody>
          <!-- Data will be populated by JS -->
        </tbody>
      </table>
    </div>
  </div>
  
  <script src="stock-reports.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
