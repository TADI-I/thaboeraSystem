<!-- notifications.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Notifications</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="notifications-container">
    <h1>Notifications</h1>
    
    <div class="notification-actions">
      <button id="markAllRead" class="btn-secondary">Mark All as Read</button>
      <button id="clearAll" class="btn-secondary">Clear All</button>
    </div>
    
    <div class="notification-tabs">
      <button class="tab-btn active" data-tab="all">All</button>
      <button class="tab-btn" data-tab="unread">Unread</button>
      <button class="tab-btn" data-tab="alerts">Alerts</button>
      <button class="tab-btn" data-tab="messages">Messages</button>
    </div>
    
    <div class="notifications-list">
      <div class="notification-item unread">
        <div class="notification-icon alert">
          <i class="icon-warning"></i>
        </div>
        <div class="notification-content">
          <h3>Low Stock Alert</h3>
          <p>Product "Network Cable" is below minimum stock level (5 remaining)</p>
          <span class="notification-time">2 hours ago</span>
        </div>
        <button class="notification-dismiss">&times;</button>
      </div>
      
      <div class="notification-item">
        <div class="notification-icon message">
          <i class="icon-message"></i>
        </div>
        <div class="notification-content">
          <h3>New Message from John</h3>
          <p>"Can you check the invoice #INV-2023-001 when you get a chance?"</p>
          <span class="notification-time">Yesterday</span>
        </div>
        <button class="notification-dismiss">&times;</button>
      </div>
      
      <!-- More notifications will be populated by JS -->
    </div>
  </div>
  
  <script src="notifications.js"></script>
</body>
</html>
